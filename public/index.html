<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fff9fc">
    <meta name="description" content="Cleo's first birthday treasure hunt — photo quests for the whole party.">
    <title>Cleo's Birthday Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <canvas id="game-bg" aria-hidden="true"></canvas>
    <div class="atmosphere" aria-hidden="true">
      <div class="light-shaft light-shaft--left"></div>
      <div class="light-shaft light-shaft--right"></div>
      <div class="grain"></div>
    </div>
    <main id="app" class="hud-shell">
      <section class="panel loading-panel">
        <div class="loader-ring" aria-hidden="true"></div>
        <p class="kicker">Cleo's First Birthday</p>
        <h1 class="title-display">Raising the treasure map…</h1>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
